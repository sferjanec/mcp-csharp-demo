services:
  db:
    image: postgres:16-alpine
    container_name: mcp-fema-db
    environment:
      - POSTGRES_USER=georg
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=fema_disaster_recovery
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U georg -d fema_disaster_recovery"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: